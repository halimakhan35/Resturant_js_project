<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us - Flavors Restaurant</title>
    <link rel="stylesheet" href="/css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar">
      <div class="logo">
        <img
          src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=100&h=100&fit=crop"
          alt="Restaurant Logo"
          class="logo-img"
        />
        <h2>Flavors<span>Restaurant</span></h2>
      </div>
      <ul class="nav-links">
        <li><a href="/index.html" class="active">Home</a></li>
        <li><a href="/menu.html">Menu</a></li>
        <li><a href="/about.html">About</a></li>
        <li><a href="/reservation.html">Reservations</a></li>
        <li><a href="/contact.html">Contact</a></li>
        <!-- Cart icon will be added automatically by JavaScript -->
      </ul>
      <div class="burger">
        <div class="line1"></div>
        <div class="line2"></div>
        <div class="line3"></div>
      </div>
    </nav>

    <section class="page-header">
      <h1>Contact Us</h1>
    </section>

    <section class="contact-section">
      <div class="contact-container">
        <div class="contact-info">
          <h3>Visit Us</h3>
          <div class="info-item">
            <i class="fas fa-map-marker-alt"></i>
            <p>123 Gourmet Street, Foodie District<br />New York, NY 10001</p>
          </div>
          <div class="info-item">
            <i class="fas fa-phone"></i>
            <p>+1 (555) 123-4567</p>
          </div>
          <div class="info-item">
            <i class="fas fa-envelope"></i>
            <p>info@flavorsrestaurant.com</p>
          </div>
          <div class="hours">
            <h4>Opening Hours</h4>
            <p>Monday - Friday: 11:00 AM - 10:00 PM</p>
            <p>Saturday - Sunday: 10:00 AM - 11:00 PM</p>
          </div>
        </div>
        <div class="map-container">
          <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d193595.9147703055!2d-74.119763973046!3d40.697403744233!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c24fa5d33f083b%3A0xc80b8f06e177fe62!2sNew%20York%2C%20NY%2C%20USA!5e0!3m2!1sen!2s!4v1620000000000!5m2!1sen!2s"
            width="100%"
            height="450"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
          >
          </iframe>
        </div>
      </div>
    </section>

    <script src="/js/script.js"></script>
  </body>
</html>
